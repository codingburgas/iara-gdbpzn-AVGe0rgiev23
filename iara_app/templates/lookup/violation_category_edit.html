{% extends "layout/base.html" %}
{% block content %}

<div class="d-flex align-items-center gap-3 mb-4">
  <a href="{{ url_for('lookup.violation_codes_list', tab='categories') }}"
     class="iara-btn iara-btn-secondary iara-btn-sm">
    <i class="bi bi-arrow-left"></i> Back
  </a>
  <h1 class="mb-0" style="font-size:1.4rem;font-weight:700;">{{ title }}</h1>
</div>

<div class="row justify-content-center">
  <div class="col-xl-5">
    <div class="iara-card p-4">
      <form method="post" novalidate>
        <input type="hidden" name="csrf_token" value="{{ csrf_token() }}">
        <div class="mb-4">
          <label class="form-label">{{ form.name.label }}</label>
          {{ form.name(class="form-control" + (" is-invalid" if form.name.errors else ""), id="cat_name") }}
          {% for e in form.name.errors %}<div class="invalid-feedback">{{ e }}</div>{% endfor %}
        </div>
        <div class="d-flex gap-2">
          {{ form.submit(class="iara-btn iara-btn-primary") }}
          <a href="{{ url_for('lookup.violation_codes_list', tab='categories') }}"
             class="iara-btn iara-btn-secondary">Cancel</a>
        </div>
      </form>
    </div>
  </div>
</div>

{% endblock %}
