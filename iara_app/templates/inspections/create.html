{% extends "layout/base.html" %}

{% block content %}
<div class="d-flex justify-content-between align-items-center mb-3">
    <h2>Start New Inspection</h2>
    <a href="{{ url_for('inspector.inspections_list') }}" class="btn btn-secondary">← Back</a>
</div>

<div class="card shadow-sm">
    <div class="card-body">
        <form method="POST">
            <input type="hidden" name="csrf_token" value="{{ csrf_token() }}">

            <div class="mb-3">
                <label class="form-label fw-bold">Vessel</label>
                <select name="vessel_id" class="form-select" required>
                    <option value="" disabled selected>— Select a vessel —</option>
                    {% for v in vessels %}
                        <option value="{{ v.id }}">
                            {{ v.call_sign }} — {{ v.international_number }} ({{ v.owner_name }})
                        </option>
                    {% endfor %}
                </select>
            </div>

            <div class="mb-3">
                <label class="form-label fw-bold">Inspection Location</label>
                <input type="text" name="location" class="form-control"
                       placeholder="e.g. Port A, Dock 3" required>
            </div>

            <div class="mb-3">
                <label class="form-label fw-bold">Notes (optional)</label>
                <textarea name="notes" class="form-control" rows="3"
                          placeholder="Any initial observations..."></textarea>
            </div>

            <button type="submit" class="btn btn-success">Create Inspection</button>
        </form>
    </div>
</div>
{% endblock %}
