{% extends "base.html" %}
{% block content %}

<h3 class="mb-4">Renew Permit</h3>

<div class="card p-4 shadow-sm">

    <p class="text-muted">
        Current expiry date: <strong>{{ permit.expiry_date }}</strong>
    </p>

    <form method="POST">
        {{ form.hidden_tag() }}

        <div class="mb-3">
            {{ form.new_expiry_date.label(class="form-label") }}
            {{ form.new_expiry_date(class="form-control") }}
        </div>

        <button type="submit" class="btn btn-primary">{{ form.submit.label.text }}</button>
        <a href="{{ url_for('main.permit_details', permit_id=permit.id) }}" class="btn btn-secondary">Cancel</a>
    </form>

</div>

{% endblock %}
