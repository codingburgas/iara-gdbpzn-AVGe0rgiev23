{% extends "layout/base.html" %}

{% block content %}
<div class="d-flex justify-content-between align-items-center mb-3">
    <h2>Add Violation — Inspection #{{ inspection.id }}</h2>
    <a href="{{ url_for('inspector.violations_list', inspection_id=inspection.id) }}"
       class="btn btn-secondary">← Back</a>
</div>

<div class="card shadow-sm">
    <div class="card-body">
        <form method="POST">
            <input type="hidden" name="csrf_token" value="{{ csrf_token() }}">

            <div class="mb-3">
                <label class="form-label fw-bold">Violation Code</label>
                <select name="violation_code_id" class="form-select">
                    <option value="none">— No Code (Custom Violation) —</option>
                    {% for code in violation_codes %}
                        <option value="{{ code.id }}">
                            {{ code.code }} — {{ code.title }}
                            {% if code.category %}({{ code.category.name }}){% endif %}
                        </option>
                    {% endfor %}
                </select>
            </div>

            <div class="mb-3">
                <label class="form-label fw-bold">Severity</label>
                <select name="severity" class="form-select" required>
                    {% for s in severities %}
                        <option value="{{ s }}">{{ s }}</option>
                    {% endfor %}
                </select>
            </div>

            <div class="mb-3">
                <label class="form-label fw-bold">Description / Notes</label>
                <textarea name="description" class="form-control" rows="4"
                          placeholder="Describe the violation in detail..."></textarea>
            </div>

            <button type="submit" class="btn btn-danger">Add Violation</button>
        </form>
    </div>
</div>
{% endblock %}
