{% extends "base.html" %}
{% block content %}

<h2 class="mb-4">Administrator Dashboard</h2>

<div class="row g-4">

    <!-- Total Permits -->
    <div class="col-md-3">
        <div class="card shadow-sm p-3 text-center">
            <h5>Total Permits</h5>
            <h2 class="text-primary">{{ total_permits }}</h2>
        </div>
    </div>

    <!-- Active -->
    <div class="col-md-3">
        <div class="card shadow-sm p-3 text-center">
            <h5>Active</h5>
            <h2 class="text-success">{{ active_permits }}</h2>
        </div>
    </div>

    <!-- Expired -->
    <div class="col-md-3">
        <div class="card shadow-sm p-3 text-center">
            <h5>Expired</h5>
            <h2 class="text-danger">{{ expired_permits }}</h2>
        </div>
    </div>

    <!-- Suspended -->
    <div class="col-md-3">
        <div class="card shadow-sm p-3 text-center">
            <h5>Suspended</h5>
            <h2 class="text-warning">{{ suspended_permits }}</h2>
        </div>
    </div>

    <!-- Expiring Soon -->
    <div class="col-md-4 mt-4">
        <div class="card shadow-sm p-3 text-center">
            <h5>Expiring in Next 30 Days</h5>
            <h2 class="text-info">{{ expiring_soon }}</h2>
        </div>
    </div>

</div>

{% endblock %}
