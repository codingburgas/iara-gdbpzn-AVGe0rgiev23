{% extends "layout/base.html" %}

{% block content %}
<div class="d-flex justify-content-between align-items-center mb-3">
    <h2>Upload Evidence — Violation #{{ violation.id }}</h2>
    <a href="{{ url_for('main.evidence_list', violation_id=violation.id) }}"
       class="btn btn-secondary">← Back</a>
</div>

<div class="card shadow-sm">
    <div class="card-body">
        <form method="POST" enctype="multipart/form-data" id="uploadForm">
            <input type="hidden" name="csrf_token" value="{{ csrf_token() }}">

            <div class="mb-3">
                <label class="form-label fw-bold">Note (optional)</label>
                <textarea name="note" class="form-control" rows="2"
                          placeholder="Describe what these photos show..."></textarea>
            </div>

            <!-- Drag & Drop Zone -->
            <div id="dropZone"
                 class="border border-primary rounded p-5 text-center mb-3"
                 style="cursor:pointer;background:#f8f9fa;">
                <p class="mb-1 fw-bold">Drag & Drop files here</p>
                <p class="text-muted mb-0">or click to select (png, jpg, jpeg, gif)</p>
                <!-- field name must be "files" to match the route -->
                <input type="file" name="files" id="fileInput" multiple accept=".png,.jpg,.jpeg,.gif" hidden>
            </div>

            <!-- Preview -->
            <div id="previewArea" class="row mb-3"></div>

            <!-- Progress Bar -->
            <div class="progress mb-3" style="height:20px;display:none;" id="progressContainer">
                <div class="progress-bar progress-bar-striped progress-bar-animated"
                     id="uploadProgress" role="progressbar" style="width:0%;">0%</div>
            </div>

            <button type="submit" class="btn btn-success">Upload</button>
        </form>
    </div>
</div>

<script>
const dropZone = document.getElementById("dropZone");
const fileInput = document.getElementById("fileInput");
const form = document.getElementById("uploadForm");
const progressContainer = document.getElementById("progressContainer");
const progressBar = document.getElementById("uploadProgress");
const previewArea = document.getElementById("previewArea");

dropZone.onclick = () => fileInput.click();

dropZone.ondragover = (e) => {
    e.preventDefault();
    dropZone.classList.add("border-success");
};
dropZone.ondragleave = () => dropZone.classList.remove("border-success");
dropZone.ondrop = (e) => {
    e.preventDefault();
    dropZone.classList.remove("border-success");
    fileInput.files = e.dataTransfer.files;
    showPreviews(fileInput.files);
};

fileInput.onchange = () => showPreviews(fileInput.files);

function showPreviews(files) {
    previewArea.innerHTML = "";
    Array.from(files).forEach(file => {
        const reader = new FileReader();
        reader.onload = (e) => {
            const col = document.createElement("div");
            col.className = "col-md-3 mb-3 text-center";
            col.innerHTML = `<img src="${e.target.result}"
                style="width:100%;height:120px;object-fit:cover;border-radius:6px;border:1px solid #ccc;">
                <p class="mt-1" style="font-size:0.8rem;">${file.name}</p>`;
            previewArea.appendChild(col);
        };
        reader.readAsDataURL(file);
    });
}

form.onsubmit = (e) => {
    e.preventDefault();
    progressContainer.style.display = "block";
    const xhr = new XMLHttpRequest();
    xhr.upload.onprogress = (event) => {
        if (event.lengthComputable) {
            const pct = Math.round((event.loaded / event.total) * 100);
            progressBar.style.width = pct + "%";
            progressBar.textContent = pct + "%";
        }
    };
    xhr.onload = () => form.submit();
    xhr.open("POST", window.location.href);
    xhr.send(new FormData(form));
};
</script>
{% endblock %}
